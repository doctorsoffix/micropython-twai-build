name: Build MicroPython with TWAI CAN

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Clone and install ESP-IDF v5.4.1
        run: |
          mkdir -p ~/esp && cd ~/esp
          git clone -b v5.4.1 --recursive --depth 1 --shallow-submodules https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32s3

      - name: Clone MicroPython v1.25.0
        run: |
          cd ~/esp
          git clone -b v1.25.0 --recursive --depth 1 https://github.com/micropython/micropython.git

      - name: Clone and patch TWAI CAN module
        run: |
          mkdir -p ~/esp/cmodules
          cd ~/esp/cmodules
          git clone https://github.com/straga/micropython-esp32-twai.git
          cd micropython-esp32-twai/src_can_v2
          sed -i 's|mp_raise_ValueError("\([^"]*\)")|mp_raise_ValueError(MP_ERROR_TEXT("\1"))|g' mod_can.c
          sed -i 's|mp_raise_TypeError("\([^"]*\)")|mp_raise_TypeError(MP_ERROR_TEXT("\1"))|g' mod_can.c
          sed -i 's|mp_raise_NotImplementedError("\([^"]*\)")|mp_raise_NotImplementedError(MP_ERROR_TEXT("\1"))|g' mod_can.c
          sed -i 's|mp_raise_msg(&\([^,]*\), "\([^"]*\)")|mp_raise_msg(\&\1, MP_ERROR_TEXT("\2"))|g' mod_can.c
          sed -i 's|mp_raise_msg_varg(&\([^,]*\), "\([^"]*\)"|mp_raise_msg_varg(\&\1, MP_ERROR_TEXT("\2")|g' mod_can.c

      - name: Create board overlay for USB console
        run: |
          mkdir -p ~/esp/micropython/ports/esp32/boards/ESP32_GENERIC_S3_CAN
          
          cat > ~/esp/micropython/ports/esp32/boards/ESP32_GENERIC_S3_CAN/mpconfigboard.h << 'EOF'
          // Use the base ESP32_GENERIC_S3 config
          #include "boards/ESP32_GENERIC_S3/mpconfigboard.h"
          EOF
          
          cat > ~/esp/micropython/ports/esp32/boards/ESP32_GENERIC_S3_CAN/mpconfigboard.cmake << 'EOF'
          set(IDF_TARGET esp32s3)
          set(SDKCONFIG_DEFAULTS
              boards/ESP32_GENERIC_S3/sdkconfig.board
              boards/ESP32_GENERIC_S3_CAN/sdkconfig.board
          )
          EOF
          
          cat > ~/esp/micropython/ports/esp32/boards/ESP32_GENERIC_S3_CAN/sdkconfig.board << 'EOF'
          CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y
          CONFIG_SPIRAM=y
          CONFIG_SPIRAM_MODE_QUAD=y
          CONFIG_SPIRAM_SPEED_80M=y
          CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y
          CONFIG_FREERTOS_HZ=1000
          CONFIG_TWAI_ISR_IN_IRAM=y
          CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240=y
          EOF

      - name: Build mpy-cross
        run: |
          cd ~/esp/micropython
          make -C mpy-cross

      - name: Build MicroPython with TWAI for ESP32-S3
        run: |
          . ~/esp/esp-idf/export.sh
          cd ~/esp/micropython/ports/esp32
          rm -f *.lock
          make submodules
          idf.py \
            -D MICROPY_BOARD=ESP32_GENERIC_S3_CAN \
            -D USER_C_MODULES="../../../../cmodules/micropython-esp32-twai/src_can_v2/micropython.cmake" \
            -B build_s3_can \
            build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: micropython-esp32s3-twai-can
          path: ~/esp/micropython/ports/esp32/build_s3_can/micropython.bin
